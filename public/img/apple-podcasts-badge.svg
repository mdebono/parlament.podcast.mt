<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 40" width="165" height="40" role="img" aria-label="Listen on Apple Podcasts">
  <defs>
    <linearGradient id="apGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F452FF"/>
      <stop offset="100%" stop-color="#832BC1"/>
    </linearGradient>
  </defs>
  <rect width="165" height="40" rx="8" fill="#000"/>
  <!-- Apple Podcasts purple icon -->
  <g transform="translate(10,8)">
    <rect width="24" height="24" rx="5.5" fill="url(#apGrad)"/>
    <!-- Mic icon -->
    <circle cx="12" cy="9.5" r="3.2" fill="white"/>
    <path d="M8.5 12.5a3.5 3.5 0 0 0 7 0" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <line x1="12" y1="16" x2="12" y2="18.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="9.5" y1="18.5" x2="14.5" y2="18.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <!-- "Listen on" text -->
  <text x="42" y="15" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="9.5" fill="white" letter-spacing="0.3">Listen on</text>
  <!-- "Apple Podcasts" text -->
  <text x="42" y="28.5" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="white" letter-spacing="-0.2">Apple Podcasts</text>
</svg>
