name: Run

on:
  # schedule:
  #   - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_backfill:
        description: 'Rebuild descriptions for all catalogued episodes from archive data'
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      (github.event_name == 'schedule' && vars.DO_RUN == 'true') ||
      (github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parliament script
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'auto' }}
          FORCE_BACKFILL: ${{ inputs.force_backfill }}
        run: python -m parlament

      - name: Upload podcast.rss artifact
        uses: actions/upload-artifact@v4
        with:
          name: podcast-rss
          path: podcast.rss
