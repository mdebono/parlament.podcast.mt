name: Run

on:
  # schedule:
  #   - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      (github.event_name == 'schedule' && vars.DO_RUN == 'true') ||
      (github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parliament script
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'auto' }}
        run: python -m parlament

      - name: Upload podcast.rss artifact
        uses: actions/upload-artifact@v4
        with:
          name: podcast-rss
          path: podcast.rss

      - name: TEMP - Dump raw sitting page HTML for debugging
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, '.')
          from parlament import papi, cache

          leg = papi.get_leg()
          sittings = papi.get_plenary_sittings(leg)
          os.makedirs('debug_html', exist_ok=True)
          for sitting in list(reversed(sittings))[:6]:
              n = papi.get_sitting_number(sitting)
              url = papi.get_sitting_url_mt(sitting)
              try:
                  r = cache.httpGet(url, referer=papi.PARLAMENT_URL)
                  path = f'debug_html/sitting-{n:03}.html'
                  with open(path, 'wb') as f:
                      f.write(r.content)
                  print(f'sitting {n}: status {r.status_code} -> {path} ({len(r.content)} bytes)')
              except Exception as e:
                  print(f'sitting {n}: ERROR {e}')
          EOF

      - name: TEMP - Upload debug HTML
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_html
          retention-days: 1
